name: Terraform

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  BUILD_ACCOUNT_EMAIL: ${{ secrets.BUILD_ACCOUNT }}
  OPERATION_ACCOUNT_EMAIL: ${{ secrets.OPERATION_ACCOUNT }}
  WORKLOAD_IDENTITY_PROVIDER_NAME: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
  ROOT_PATH_IAC_APPLICATION: ./terraform/gcp/prod
  ROOT_PATH_IAC_ROOT: ./terraform/gcp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          service_account: ${{ env.OPERATION_ACCOUNT_EMAIL }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        id: fmt
        working-directory: ${{ env.ROOT_PATH_IAC_ROOT }}
        run: terraform fmt -recursive -check
        continue-on-error: true
      - name: Terraform Init
        id: init
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform init
      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform validate -no-color
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform plan -no-color -lock=false
        continue-on-error: true
        env:
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_service_account: ${{ env.OPERATION_ACCOUNT_EMAIL }}
      - name: Create Pull Request Comment
        uses: actions/github-script@v7
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          service_account: ${{ env.OPERATION_ACCOUNT_EMAIL }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform init
      - name: Terraform Apply
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform apply -auto-approve -lock=false
        env:
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_service_account: ${{ env.OPERATION_ACCOUNT_EMAIL }}
