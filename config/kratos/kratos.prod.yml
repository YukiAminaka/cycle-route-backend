version: v0.13.0

# dsn: DSN env var で設定

serve:
  public:
    # base_url: SERVE_PUBLIC_BASE_URL env var で設定
    cors:
      enabled: true
      allow_credentials: true
      # allowed_origins: SERVE_PUBLIC_CORS_ALLOWED_ORIGINS_0 env var で設定
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Content-Type
        - Authorization
  admin:
    # base_url: SERVE_ADMIN_BASE_URL env var で設定

selfservice:
  # default_browser_return_url: SELFSERVICE_DEFAULT_BROWSER_RETURN_URL env var で設定
  # allowed_return_urls: SELFSERVICE_ALLOWED_RETURN_URLS_0 env var で設定

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Rideline
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true

  flows:
    error:
      # ui_url: SELFSERVICE_FLOWS_ERROR_UI_URL env var で設定

    settings:
      # ui_url: SELFSERVICE_FLOWS_SETTINGS_UI_URL env var で設定
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      # ui_url: SELFSERVICE_FLOWS_RECOVERY_UI_URL env var で設定
      use: code

    verification:
      enabled: true
      # ui_url: SELFSERVICE_FLOWS_VERIFICATION_UI_URL env var で設定
      use: code
      after:
        # default_browser_return_url: SELFSERVICE_FLOWS_VERIFICATION_AFTER_DEFAULT_BROWSER_RETURN_URL env var で設定

    logout:
      after:
        # default_browser_return_url: SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL env var で設定

    login:
      # ui_url: SELFSERVICE_FLOWS_LOGIN_UI_URL env var で設定
      lifespan: 10m

    registration:
      lifespan: 10m
      # ui_url: SELFSERVICE_FLOWS_REGISTRATION_UI_URL env var で設定
      after:
        password:
          hooks:
            - hook: web_hook
              config:
                # url: SELFSERVICE_FLOWS_REGISTRATION_AFTER_PASSWORD_HOOKS_0_CONFIG_URL env var で設定
                method: POST
                body: file:///etc/config/kratos/hooks/create-profile.jsonnet
            - hook: show_verification_ui
            - hook: session

log:
  level: info
  format: json
  leak_sensitive_values: false

# secrets.cookie: SECRETS_COOKIE_0 env var で設定
# secrets.cipher: SECRETS_CIPHER_0 env var で設定

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    # connection_uri: COURIER_SMTP_CONNECTION_URI env var で設定
    # from_address: COURIER_SMTP_FROM_ADDRESS env var で設定
    from_name: Rideline

feature_flags:
  use_continue_with_transitions: true

cookies:
  domain: ride-line.net
  same_site: Lax

session:
  cookie:
    domain: ride-line.net
