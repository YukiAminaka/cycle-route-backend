name: Terraform

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
  ENVIRONMENT: "production"
  KRATOS_SMTP_CONNECTION_URI: ${{ secrets.KRATOS_SMTP_CONNECTION_URI }}
  KRATOS_SMTP_FROM_ADDRESS: ${{ secrets.KRATOS_SMTP_FROM_ADDRESS }}
  KRATOS_PUBLIC_BASE_URL: ${{ secrets.KRATOS_PUBLIC_BASE_URL }}
  KRATOS_ADMIN_BASE_URL: ${{ secrets.KRATOS_ADMIN_BASE_URL }}
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
  BACKEND_URL: ${{ secrets.BACKEND_URL }}
  OPERATION_ACCOUNT_EMAIL: ${{ secrets.OPERATION_ACCOUNT }}
  WORKLOAD_IDENTITY_PROVIDER_NAME: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
  ROOT_PATH_IAC_APPLICATION: ./terraform/gcp/prod
  ROOT_PATH_IAC_ROOT: ./terraform/gcp
  FRONTEND_GITHUB_REPOSITORY: ${{ secrets.FRONTEND_GITHUB_REPOSITORY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          service_account: ${{ env.OPERATION_ACCOUNT_EMAIL }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        id: fmt
        working-directory: ${{ env.ROOT_PATH_IAC_ROOT }}
        run: terraform fmt -recursive -check
        continue-on-error: true
      - name: Terraform Init
        id: init
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform init
      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform validate -no-color
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.52.0
          cache: true
      - name: Show version
        run: tflint --version
      - name: Init TFLint
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: tflint --init --config "$(pwd)"/.tflint.hcl
      - name: Run TFLint
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: tflint --config "$(pwd)"/.tflint.hcl --format compact
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform plan -no-color -lock-timeout=60s
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_frontend_github_repository: ${{ env.FRONTEND_GITHUB_REPOSITORY }}
          TF_VAR_kratos_smtp_connection_uri: ${{ env.KRATOS_SMTP_CONNECTION_URI }}
          TF_VAR_kratos_smtp_from_address: ${{ env.KRATOS_SMTP_FROM_ADDRESS }}
          TF_VAR_kratos_public_base_url: ${{ env.KRATOS_PUBLIC_BASE_URL }}
          TF_VAR_kratos_admin_base_url: ${{ env.KRATOS_ADMIN_BASE_URL }}
          TF_VAR_frontend_url: ${{ env.FRONTEND_URL }}
          TF_VAR_backend_url: ${{ env.BACKEND_URL }}
      - name: Create Pull Request Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- terraform-plan-comment -->';
            const output = `${marker}
            #### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          service_account: ${{ env.OPERATION_ACCOUNT_EMAIL }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform init
      - name: Terraform Apply
        working-directory: ${{ env.ROOT_PATH_IAC_APPLICATION }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_frontend_github_repository: ${{ env.FRONTEND_GITHUB_REPOSITORY }}
          TF_VAR_kratos_smtp_connection_uri: ${{ env.KRATOS_SMTP_CONNECTION_URI }}
          TF_VAR_kratos_smtp_from_address: ${{ env.KRATOS_SMTP_FROM_ADDRESS }}
          TF_VAR_kratos_public_base_url: ${{ env.KRATOS_PUBLIC_BASE_URL }}
          TF_VAR_kratos_admin_base_url: ${{ env.KRATOS_ADMIN_BASE_URL }}
          TF_VAR_frontend_url: ${{ env.FRONTEND_URL }}
          TF_VAR_backend_url: ${{ env.BACKEND_URL }}
