name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "config/**"
      - "docker/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/deploy.yml"
      - ".github/actions/**"
  pull_request:
    branches: ["main"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "config/**"
      - "docker/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/deploy.yml"
      - ".github/actions/**"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  BUILD_ACCOUNT_EMAIL: ${{ secrets.BUILD_ACCOUNT }}
  WORKLOAD_IDENTITY_PROVIDER_NAME: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}

  ARTIFACT_REPO_API: ${{ secrets.ARTIFACT_REPO_API }}
  ARTIFACT_REPO_KRATOS: ${{ secrets.ARTIFACT_REPO_KRATOS }}

  CLOUD_RUN_API: rideline-prod-api
  CLOUD_RUN_KRATOS_PUBLIC: rideline-prod-kratos-public
  CLOUD_RUN_KRATOS_ADMIN: rideline-prod-kratos-admin

  ROOT_PATH_API: .
  DOCKERFILE_API: docker/api/Dockerfile.prod
  DOCKERFILE_KRATOS: docker/kratos/Dockerfile

  API_URL: "http://localhost:8080"

concurrency: # 多重実行の防止
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request'}}

jobs:
  build-api:
    name: Docker Build API
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # main push時とmainブランチへのPR時に実行
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || github.ref == 'refs/heads/main'
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - id: "checkout"
        name: "Checkout"
        uses: actions/checkout@v4
      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          token_format: "access_token"
          service_account: ${{ env.BUILD_ACCOUNT_EMAIL }} # 利用したいサービスアカウント
          workload_identity_provider: "${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}"
      # Google Cloud の Artifact Registry（Docker レジストリ）にログイン
      - name: Authorize Docker
        id: "docker-auth"
        uses: "docker/login-action@v3"
        with:
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"
          registry: "${{ env.REGION }}-docker.pkg.dev"
      - name: Handle Docker Image for API
        uses: ./.github/actions/docker-image-build-and-rotate
        with:
          context: "${{ env.ROOT_PATH_API }}"
          dockerfile: "${{ env.DOCKERFILE_API }}"
          artifact_repo: "${{ env.ARTIFACT_REPO_API }}"
          build_args: ""
          push_image: ${{ github.event_name != 'pull_request'}} # PRのときはイメージをビルドするだけでpushしない
      - name: Handle Docker Image for Kratos
        uses: ./.github/actions/docker-image-build-and-rotate
        with:
          context: "${{ env.ROOT_PATH_API }}"
          dockerfile: "${{ env.DOCKERFILE_KRATOS }}"
          artifact_repo: "${{ env.ARTIFACT_REPO_KRATOS }}"
          build_args: ""
          push_image: ${{ github.event_name != 'pull_request'}} # PRのときはイメージをビルドするだけでpushしない
      - name: Deploy API to Cloud Run
        if: github.event_name != 'pull_request'
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_API }}
          image: "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO_API }}:${{ github.sha }}"
          region: ${{ env.REGION }}
      - name: Deploy Kratos Public to Cloud Run
        if: github.event_name != 'pull_request'
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_KRATOS_PUBLIC }}
          image: "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO_KRATOS }}:${{ github.sha }}"
          region: ${{ env.REGION }}
      - name: Deploy Kratos Admin to Cloud Run
        if: github.event_name != 'pull_request'
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_KRATOS_ADMIN }}
          image: "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO_KRATOS }}:${{ github.sha }}"
          region: ${{ env.REGION }}
