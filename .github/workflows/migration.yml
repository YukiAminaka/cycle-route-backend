name: DB Migration and Check

on:
  push:
    branches: ["main"]
    paths:
      - "db/migrations/**"
      - ".github/workflows/migration.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "db/migrations/**"
      - ".github/workflows/migration.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  BUILD_ACCOUNT_EMAIL: ${{ secrets.BUILD_ACCOUNT }}
  WORKLOAD_IDENTITY_PROVIDER_NAME: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
  ARTIFACT_REPO_ATLAS: ${{ secrets.ARTIFACT_REPO_ATLAS }}
  IMAGE_NAME_ATLAS: atlas
  CLOUD_RUN_ATLAS_MIGRATE_JOB: rideline-production-atlas-migrate
  ROOT_PATH_ATLAS: db
  DOCKERFILE_ATLAS: db/Dockerfile

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

jobs:
  sqlc-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.27.0"
      - name: SQLC Compile
        run: sqlc compile

  build-atlas:
    name: Docker Build Atlas
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || github.ref == 'refs/heads/main'
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          token_format: "access_token"
          service_account: ${{ env.BUILD_ACCOUNT_EMAIL }}
          workload_identity_provider: "${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}"
      - name: Authorize Docker
        uses: "docker/login-action@v3"
        with:
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"
          registry: "${{ env.REGION }}-docker.pkg.dev"
      - name: Handle Docker Image for Atlas
        uses: ./.github/actions/docker-image-build-and-rotate
        with:
          context: "${{ env.ROOT_PATH_ATLAS }}"
          dockerfile: "${{ env.DOCKERFILE_ATLAS }}"
          image_name: ${{ env.IMAGE_NAME_ATLAS }}
          artifact_repo: "${{ env.ARTIFACT_REPO_ATLAS }}"
          push_image: ${{ github.event_name != 'pull_request' }} # PRのときはイメージをビルドするだけでpushしない

  migrate-deploy:
    name: Run Atlas Migration
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' # メインブランチ時のみ実行
    permissions:
      id-token: write
      contents: read
    needs: sqlc-check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          service_account: ${{ env.BUILD_ACCOUNT_EMAIL }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER_NAME }}
      - name: Update Atlas Migration Job image
        run: |
          gcloud run jobs update ${{ env.CLOUD_RUN_ATLAS_MIGRATE_JOB }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO_ATLAS }}/${{ env.IMAGE_NAME_ATLAS }}:${{ github.sha }}" \
            --region ${{ env.REGION }}
      - name: Run Atlas Migration
        run: |
          gcloud run jobs execute ${{ env.CLOUD_RUN_ATLAS_MIGRATE_JOB }} \
            --region ${{ env.REGION }} \
            --wait
